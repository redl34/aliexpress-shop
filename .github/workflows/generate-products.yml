name: Generate products.json

on:
  push:
    branches: [ main ]   # або master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # завантажуємо всю історію, щоб можна було зробити pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run generation script
        run: node generateProducts.js

      - name: Pull latest changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main   # завантажуємо зміни, які могли з'явитися

      - name: Commit and push if changed
        run: |
          git add products.json
          # Перевіряємо, чи є зміни для коміту
          if ! git diff --quiet && git diff --staged --quiet; then
            git commit -m "Auto-update products.json"
            git push
          fi
