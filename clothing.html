<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" name="viewport"/>
    <title>Одяг - Ali.Reed</title>
    <link href="https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/AliShopik.png" rel="icon" type="image/png"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* ===== БАЗОВІ СТИЛІ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3E717A;
            overflow-x: hidden;
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            background: url('Oformlennya_imeg/clothing.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 80px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        header h1 {
            position: relative;
            z-index: 2;
            margin: 0 0 20px 0;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            word-break: break-word;
            padding: 0 10px;
        }
        
        /* Контейнер для кнопок */
        .buttons-container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0;
            padding: 0 15px;
        }
        
        header .home-link, header .profile-link {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background-color: #ff6b6b;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        header .home-link:hover, header .profile-link:hover {
            background-color: #e55a5a;
            text-decoration: none;
        }
        
        .search-container {
            position: relative;
            z-index: 2;
            margin: 20px auto;
            max-width: 500px;
            width: 100%;
            display: flex;
            gap: 10px;
            padding: 0 15px;
            box-sizing: border-box;
        }
        .search-container input {
            flex-grow: 1;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            min-width: 0;
        }
        .search-container button {
            padding: 12px 24px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            white-space: nowrap;
        }
        .search-container button:hover {
            background-color: #e55a5a;
        }
        
        /* КАТЕГОРІЇ - ВЕРТИКАЛЬНЕ РОЗТАШУВАННЯ У СТОВПЧИК ПО ЦЕНТРУ */
        .category-buttons {
            max-width: 350px;
            margin: 20px auto;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .category-button {
            padding: 15px 30px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1em;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.2s, transform 0.2s;
            font-weight: bold;
            width: 100%;
            max-width: 280px;
        }
        
        .category-button:hover {
            background-color: #e55a5a;
            transform: translateY(-2px);
        }
        
        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            bottom: 0;
            width: 100%;
            margin-top: auto;
            overflow-x: hidden;
        }
        footer .social-links {
            text-align: center;
        }
        footer .social-links h2 {
            font-size: clamp(1.2rem, 3vw, 1.4rem);
            margin-bottom: 15px;
        }
        footer .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            padding: 0 15px;
        }
        footer .social-buttons a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        footer .social-buttons a.tiktok {
            background-color: #000000;
            border: 1px solid #fff;
        }
        footer .social-buttons a.facebook {
            background-color: #1877f2;
        }
        footer .social-buttons a.instagram {
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        }
        footer .social-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        footer .social-buttons a i {
            font-size: 1.2em;
        }
        
        /* ===== АДАПТАЦІЯ ДЛЯ РІЗНИХ РОЗМІРІВ ЕКРАНУ ===== */
        @media (max-width: 768px) {
            .buttons-container {
                gap: 10px;
            }
            
            header .home-link, header .profile-link {
                padding: 8px 15px;
                font-size: 0.9em;
            }
            
            .search-container {
                flex-direction: column;
                align-items: center;
                padding: 0 10px;
            }
            
            .search-container input, .search-container button {
                width: 100%;
                max-width: 280px;
            }
            
            .search-container button {
                white-space: normal;
            }
            
            .category-buttons {
                padding: 20px 10px;
                gap: 15px;
            }
            
            .category-button {
                padding: 12px 25px;
                font-size: 1em;
                max-width: 260px;
            }
            
            footer .social-buttons {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }
            
            footer .social-buttons a {
                padding: 8px 16px;
                font-size: 0.85rem;
                min-width: 120px;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            header {
                padding: 60px 15px;
            }
            
            header h1 {
                font-size: 1.8rem;
            }
            
            .buttons-container {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            
            header .home-link, header .profile-link {
                width: 90%;
                max-width: 200px;
                justify-content: center;
            }
            
            .category-buttons {
                max-width: 280px;
                gap: 12px;
            }
            
            .category-button {
                padding: 12px 20px;
                font-size: 0.95em;
                max-width: 240px;
            }
            
            footer .social-buttons {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            
            footer .social-buttons a {
                width: 100%;
                max-width: 180px;
                justify-content: center;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js" type="module"></script>
</head>
<body>
    <header>
        <h1>Одяг</h1>
        <div class="buttons-container">
            <a class="home-link" href="index.html"><i class="fas fa-home"></i> Головна</a>
            <a class="profile-link" href="#" id="profileLink"><i class="fas fa-user"></i> Мій профіль</a>
        </div>
        <div class="search-container">
            <input id="searchInput" placeholder="Введіть артикул або назву товару" type="text"/>
            <button onclick="redirectToSearch()">Пошук</button>
        </div>
    </header>
    <div class="category-buttons">
        <a href="mens-clothing_page_1.html" class="category-button"><i class="fas fa-male"></i> Чоловічий одяг</a>
        <a href="womens-clothing_page_1.html" class="category-button"><i class="fas fa-female"></i> Жіночий одяг</a>
        <a href="footwear_page_1.html" class="category-button"><i class="fas fa-shoe-prints"></i> Взуття</a>
        <a href="miscellaneous_page_1.html" class="category-button"><i class="fas fa-tshirt"></i> Різне</a>
    </div>
    <footer>
        <div class="social-links">
            <h2>Слідкуй за новинками в</h2>
            <div class="social-buttons">
                <a href="https://www.tiktok.com/@reedoffe" target="_blank" class="tiktok"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="https://www.facebook.com" target="_blank" class="facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a href="https://www.instagram.com/alishop__25?igsh=MXB2YmZoNWEzcWJ1Mw==" target="_blank" class="instagram"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
        <p>© 2026 AliShop</p>
    </footer>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAGzhOScgX59UvDxFffwPRx9YqYAaqGj-Q",
            authDomain: "alishopping-ced60.firebaseapp.com",
            projectId: "alishopping-ced60",
            storageBucket: "alishopping-ced60.firebasestorage.app",
            messagingSenderId: "869364972631",
            appId: "1:869364972631:web:f9b736868d9844b3e7f712",
            measurementId: "G-SF4MY2768F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const profileLink = document.getElementById('profileLink');
        onAuthStateChanged(auth, (user) => {
            if (user) {
                profileLink.href = 'profile.html';
                profileLink.innerHTML = '<i class="fas fa-user"></i> Мій профіль';
            } else {
                profileLink.href = 'login.html';
                profileLink.innerHTML = '<i class="fas fa-sign-in-alt"></i> Увійти';
            }
        });

        // Функція пошуку (перенаправлення на search.html)
        window.redirectToSearch = function() {
            const searchInput = document.getElementById('searchInput').value.trim();
            if (searchInput) {
                window.location.href = `search.html?q=${encodeURIComponent(searchInput)}`;
            } else {
                alert('Введіть запит для пошуку');
            }
        };

        // Обробка натискання Enter в пошуку
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                redirectToSearch();
            }
        });
    </script>
</body>
</html>
