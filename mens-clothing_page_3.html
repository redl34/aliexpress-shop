<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Чоловічий одяг - AliShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" referrerpolicy="no-referrer" rel="stylesheet"/>
    <link href="https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/AliShopik.png" rel="icon" type="image/png"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #3E717A;
        }

        header {
            background: url('Oformlennya_imeg/clothing.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        header h1 {
            position: relative;
            z-index: 2;
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        header .home-link, header .profile-link {
            position: relative;
            z-index: 2;
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            margin: 10px 20px;
            padding: 10px 20px;
            background-color: #ff6b6b;
            border-radius: 5px;
        }

        header .home-link:hover, header .profile-link:hover {
            background-color: #e55a5a;
            text-decoration: none;
        }

        .search-container {
            position: relative;
            z-index: 2;
            margin: 20px auto;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }

        .search-container input {
            flex-grow: 1;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .search-container button {
            padding: 12px 24px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }

        .search-container button:hover {
            background-color: #e55a5a;
        }

        .products {
            margin: 20px auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 284px));
            gap: 20px;
            justify-content: center;
            max-width: 1250px;
        }

        .product-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 284px;
            height: 572px;
            position: relative;
        }

        .product-image-carousel {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-image {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            display: none;
            object-fit: contain;
        }

        .carousel-image.active {
            display: block;
        }

        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            z-index: 10;
            border-radius: 2px;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .carousel-prev:hover, .carousel-next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        /* ОНОВЛЕНО: Ще на 3px ближче (разом на 8px від оригіналу) */
        .carousel-prev {
            left: -4px;
        }

        .carousel-next {
            right: -4px;
        }

        .carousel-indicators {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            cursor: pointer;
        }

        .indicator.active {
            background-color: rgba(255, 255, 255, 0.9);
        }

        .product-details {
            flex-grow: 1;
            text-align: center;
            margin: 5px 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
        }

        .product-details h3 {
            margin: 8px 0;
            font-size: 1em;
            color: #2c3e50;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 40px;
            font-weight: bold;
        }

        .product-details .articul {
            font-size: 0.85em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }

        .product-details .price {
            font-size: 1.2em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }

        .hidden-script-description {
            display: none;
        }

        .description-container {
            font-size: 0.8em;
            color: #2c3e50;
            margin: 8px 0;
            line-height: 1.4;
            background-color: #f9f9f9;
            padding: 8px;
            border-radius: 5px;
            height: 100px;
            overflow-y: auto;
            text-align: left;
            font-weight: normal;
        }

        .description-container::-webkit-scrollbar {
            width: 11px;
        }

        .description-container::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 5px;
        }

        .description-container::-webkit-scrollbar-thumb {
            background: #A9A34C;
            border-radius: 5px;
        }

        .description-container::-webkit-scrollbar-thumb:hover {
            background: #8e8a3f;
        }

        .product-details a {
            color: #ffffff;
            text-decoration: none;
            background-color: #132F13;
            padding: 8px 12px;
            border-radius: 5px;
            display: block;
            margin: 6px 0;
            font-size: 0.8em;
            font-weight: bold;
        }

        .product-details a:hover {
            background-color: #0e240e;
        }

        .add-to-favorites {
            background-color: #A9A34C;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            width: 100%;
            font-weight: bold;
        }

        .add-to-favorites:hover {
            background-color: #8e8a3f;
        }

        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        footer .social-links {
            text-align: center;
        }

        footer .social-links h2 {
            font-size: clamp(1.2rem, 3vw, 1.4rem);
            margin-bottom: 15px;
        }

        footer .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        footer .social-buttons a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        footer .social-buttons a.tiktok {
            background-color: #000000;
            border: 1px solid #fff;
        }

        footer .social-buttons a.facebook {
            background-color: #1877f2;
        }

        footer .social-buttons a.instagram {
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        }

        footer .social-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            background-color: #e0e0e0;
            padding: 10px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 33%;
        }

        .pagination a {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            text-decoration: none;
            border-radius: 9px;
            font-size: 1em;
            font-weight: bold;
        }

        .pagination a.active {
            background-color: white;
            color: black;
            border: 5px solid #e0930d;
            line-height: 35px;
        }

        .pagination a:not(.active) {
            background-color: #d3d3d3;
            color: black;
            border: 1px solid #a9a9a9;
        }

        /* АДАПТАЦІЯ ТА ЗМІЩЕННЯ КНОПОК */
        @media (max-width: 1250px) {
            .products {
                grid-template-columns: repeat(3, minmax(0, 284px));
            }
            .carousel-prev {
                left: 0px; /* Було -3px */
            }
            .carousel-next {
                right: 0px; /* Було -3px */
            }
        }

        @media (max-width: 950px) {
            .products {
                grid-template-columns: repeat(2, minmax(0, 284px));
            }
            .carousel-prev {
                left: 3px; /* Було 0px - тепер трохи всередині */
            }
            .carousel-next {
                right: 3px; /* Було 0px - тепер трохи всередині */
            }
        }

        @media (max-width: 650px) {
            .products {
                grid-template-columns: repeat(1, minmax(0, 284px));
            }
            .carousel-prev {
                left: 5px; /* Було 2px - зміщено всередину для зручності */
            }
            .carousel-next {
                right: 5px; /* Було 2px - зміщено всередину для зручності */
            }
            .pagination {
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Чоловічий одяг</h1>
    <a class="home-link" href="index.html">Повернутися на головну</a>
    <a class="profile-link" href="#" id="profileLink">Мій профіль</a>
    <div class="search-container">
        <input id="searchInput" placeholder="Введіть артикул або назву товару" type="text"/>
        <button onclick="redirectToSearch()">Пошук</button>
    </div>
</header>

<div class="products">
    <!-- Приклад товару з оновленими кнопками -->
    <div class="product-card" data-articul="0211B">
        <div class="product-image-carousel">
            <div class="carousel-container">
                <img class="carousel-image active" src="Men's_clothing_imeg/0211B1.jpg" alt="Чоловічий светр"/>
                <img class="carousel-image" src="Men's_clothing_imeg/0211B2.jpg" alt="Чоловічий светр"/>
                <img class="carousel-image" src="Men's_clothing_imeg/0211B3.jpg" alt="Чоловічий светр"/>
                <button class="carousel-prev">←</button>
                <button class="carousel-next">→</button>
                <div class="carousel-indicators">
                    <span class="indicator active"></span>
                    <span class="indicator"></span>
                    <span class="indicator"></span>
                </div>
            </div>
        </div>
        <div class="product-details">
            <h3>Чоловічий светр</h3>
            <div class="description-container">Чоловічий светр осінь-зима новий в'язаний светр з високою горловиною...</div>
            <p class="articul">арт. 0211B</p>
            <p class="price">458.77 грн</p>
            <a href="https://s.click.aliexpress.com/e/_c4rl2Ie1" target="_blank">Купити на AliExpress</a>
            <button class="add-to-favorites">Додати до обраного</button>
        </div>
    </div>
    <!-- Додайте інші товари тут -->
</div>

<footer>
    <div class="social-links">
        <h2>Ми в соцмережах</h2>
        <div class="social-buttons">
            <a class="tiktok" href="#"><i class="fab fa-tiktok"></i> TikTok</a>
            <a class="facebook" href="#"><i class="fab fa-facebook"></i> Facebook</a>
            <a class="instagram" href="#"><i class="fab fa-instagram"></i> Instagram</a>
        </div>
    </div>
</footer>

<script>
    // Проста логіка каруселі для перевірки
    document.querySelectorAll('.carousel-container').forEach(carousel => {
        const images = carousel.querySelectorAll('.carousel-image');
        const prev = carousel.querySelector('.carousel-prev');
        const next = carousel.querySelector('.carousel-next');
        const indicators = carousel.querySelectorAll('.indicator');
        let index = 0;

        function updateCarousel(newIndex) {
            images[index].classList.remove('active');
            indicators[index].classList.remove('active');
            index = newIndex;
            images[index].classList.add('active');
            indicators[index].classList.add('active');
        }

        next.addEventListener('click', () => {
            let newIndex = (index + 1) % images.length;
            updateCarousel(newIndex);
        });

        prev.addEventListener('click', () => {
            let newIndex = (index - 1 + images.length) % images.length;
            updateCarousel(newIndex);
        });
    });
</script>
</body>
</html>
