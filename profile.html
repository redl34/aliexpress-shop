<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Мій профіль - Ali.Reed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" referrerpolicy="no-referrer" rel="stylesheet"/>
    <link href="https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/AliShopik.png" rel="icon" type="image/png"/>
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3E717A;
        }
        header {
            background: url('Oformlennya_imeg/electronics.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        header h1 {
            position: relative;
            z-index: 2;
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        header .home-link, header .logout-link {
            position: relative;
            z-index: 2;
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            margin: 10px 20px;
            padding: 10px 20px;
            background-color: #ff6b6b;
            border-radius: 5px;
        }
        header .home-link:hover, header .logout-link:hover {
            background-color: #e55a5a;
            text-decoration: none;
        }
        .search-container {
            position: relative;
            z-index: 2;
            margin: 20px auto;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }
        .search-container input {
            flex-grow: 1;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        .search-container button {
            padding: 10px 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .search-container button:hover {
            background-color: #e55a5a;
        }
        .products {
            margin: 20px auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }
        .product-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            aspect-ratio: 3 / 4;
        }
        .product-image-container {
            width: 100%;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 5px;
        }
        .product-details {
            flex-grow: 1;
            text-align: center;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
        }
        .product-details h3 {
            margin: 10px 0;
            font-size: 1.1em;
            color: #2c3e50;
        }
        .product-details .articul {
            font-size: 0.9em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }
        .product-details .price {
            font-size: 1.2em;
            font-weight: bold;
            color: #e63946;
            margin: 5px 0;
        }
        .product-details a {
            color: #ffffff;
            text-decoration: none;
            background-color: #132F13;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .product-details a:hover {
            background-color: #0e240e;
        }
        .remove-from-favorites {
            background-color: #e63946;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
        }
        .remove-from-favorites:hover {
            background-color: #c94c4c;
        }
        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        footer .social-links {
            text-align: center;
        }
        footer .social-links h2 {
            font-size: clamp(1.2rem, 3vw, 1.4rem);
            margin-bottom: 15px;
        }
        footer .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        footer .social-buttons a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        footer .social-buttons a.tiktok {
            background-color: #000000;
            border: 1px solid #fff;
        }
        footer .social-buttons a.facebook {
            background-color: #1877f2;
        }
        footer .social-buttons a.instagram {
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        }
        footer .social-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        footer .social-buttons a i {
            font-size: 1.2em;
        }
        .no-favorites {
            color: white;
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }
        .loading {
            color: white;
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }
        .debug-panel {
            background-color: #1a1a2e;
            color: #00ffcc;
            padding: 15px;
            margin: 20px auto;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            max-width: 90%;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                align-items: center;
            }
            .search-container input, .search-container button {
                width: 100%;
                max-width: 200px;
            }
            .products {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                padding: 20px 10px;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js" type="module"></script>
</head>
<body>
    <header>
        <h1>Мій профіль</h1>
        <a class="home-link" href="index.html">Повернутися на головну</a>
        <a class="logout-link" href="#" id="logoutLink">Вийти</a>
        <div class="search-container">
            <input id="searchInput" placeholder="Введіть артикул або назву товару" type="text"/>
            <button onclick="searchProducts()">Пошук</button>
        </div>
    </header>
    <div id="debugPanel" class="debug-panel" style="display: none;"></div>
    <div class="products" id="favoritesList">
        <div class="loading">⏳ Завантаження обраних товарів...</div>
    </div>
    <footer>
        <div class="social-links">
            <h2>Слідкуй за новинками в</h2>
            <div class="social-buttons">
                <a class="tiktok" href="https://www.tiktok.com/@reedoffe" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
                <a class="facebook" href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a class="instagram" href="https://www.instagram.com/alishop__25?igsh=MXB2YmZoNWEzcWJ1Mw==" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
        <p>© 2026 Ali.Reed</p>
    </footer>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAGzhOScgX59UvDxFffwPRx9YqYAaqGj-Q",
            authDomain: "alishopping-ced60.firebaseapp.com",
            projectId: "alishopping-ced60",
            storageBucket: "alishopping-ced60.firebasestorage.app",
            messagingSenderId: "869364972631",
            appId: "1:869364972631:web:f9b736868d9844b3e7f712",
            measurementId: "G-SF4MY2768F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Глобальна змінна для зберігання даних товарів
        let productsDatabase = [];

        // Функція для додавання повідомлень в консоль і на сторінку
        function addDebugMessage(message, isError = false) {
            const timestamp = new Date().toLocaleTimeString();
            const formattedMessage = `[${timestamp}] ${message}`;
            console.log(isError ? '❌ ' + formattedMessage : '✅ ' + formattedMessage);
            
            // Показуємо панель налагодження тільки якщо є помилки або в режимі розробки
            const debugPanel = document.getElementById('debugPanel');
            if (debugPanel) {
                debugPanel.style.display = 'block';
                const messageElement = document.createElement('div');
                messageElement.style.color = isError ? '#ff6b6b' : '#00ffcc';
                messageElement.style.margin = '5px 0';
                messageElement.textContent = (isError ? '❌ ' : '✅ ') + formattedMessage;
                debugPanel.appendChild(messageElement);
                // Автоскрол донизу
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
        }

        // Функція тестування доступу до Firestore
        async function testFirestoreAccess() {
            try {
                addDebugMessage('Тестуємо доступ до Firestore...');
                const testRef = collection(db, 'favorites');
                const testQuery = query(testRef, where('userId', '==', auth.currentUser.uid));
                const snapshot = await getDocs(testQuery);
                addDebugMessage(`✅ Доступ є! Знайдено документів: ${snapshot.size}`);
                snapshot.forEach(docSnapshot => {
                    addDebugMessage(`Документ: ${docSnapshot.id} -> ${JSON.stringify(docSnapshot.data())}`);
                });
                return true;
            } catch (error) {
                addDebugMessage(`❌ Помилка доступу: ${error.message}`, true);
                addDebugMessage(`Код помилки: ${error.code}`, true);
                if (error.code === 'permission-denied') {
                    addDebugMessage('🔧 ПОТРІБНО НАЛАШТУВАТИ ПРАВИЛА БЕЗПЕКИ FIREBASE:', true);
                    addDebugMessage(`
                        Потрібно додати такі правила:
                        
                        rules_version = '2';
                        service cloud.firestore {
                          match /databases/{database}/documents {
                            match /favorites/{document} {
                              allow read, write: if request.auth != null;
                            }
                          }
                        }
                    `, true);
                }
                return false;
            }
        }

        // Завантаження products.json
        async function loadProductsDatabase() {
            try {
                addDebugMessage('Завантаження products.json...');
                const response = await fetch('products.json');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                const data = await response.json();
                productsDatabase = data.products || data;
                addDebugMessage(`✅ Завантажено товарів: ${productsDatabase.length}`);
                return productsDatabase;
            } catch (error) {
                addDebugMessage(`❌ Помилка завантаження products.json: ${error.message}`, true);
                return [];
            }
        }

        // Отримання повної інформації про товар за ID
        function getProductById(productId) {
            const product = productsDatabase.find(p => p.id === productId);
            if (!product) {
                addDebugMessage(`⚠️ Товар з ID ${productId} не знайдено в products.json`, true);
            }
            return product;
        }

        // Перевірка автентифікації
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                addDebugMessage('Користувач не авторизований, перенаправлення на login.html');
                window.location.href = 'login.html';
                return;
            }
            addDebugMessage(`Користувач увійшов: ${user.uid} (${user.email || 'email не вказано'})`);
            
            // Тестуємо доступ до Firestore
            await testFirestoreAccess();
            
            // Завантажуємо базу товарів
            await loadProductsDatabase();
            
            // Завантажуємо обрані товари
            await loadFavorites(user.uid);
        });

        // Функція виходу
        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            addDebugMessage('Спроба виходу з акаунту...');
            try {
                await signOut(auth);
                addDebugMessage('✅ Вихід виконано успішно');
                window.location.href = 'login.html';
            } catch (error) {
                addDebugMessage(`❌ Помилка виходу: ${error.message}`, true);
                alert('Помилка виходу: ' + error.message);
            }
        });

        // Завантаження обраних товарів з Firestore
        async function loadFavorites(userId) {
            const favoritesList = document.getElementById('favoritesList');
            favoritesList.innerHTML = '<div class="loading">⏳ Завантаження...</div>';
            
            // Очищуємо панель налагодження при новому завантаженні
            const debugPanel = document.getElementById('debugPanel');
            if (debugPanel) {
                debugPanel.innerHTML = '<strong>📋 Лог налагодження:</strong><br>';
            }

            try {
                addDebugMessage(`Завантаження обраних товарів для userId: ${userId}`);
                const q = query(collection(db, 'favorites'), where('userId', '==', userId));
                const querySnapshot = await getDocs(q);
                
                addDebugMessage(`Знайдено обраних товарів у Firestore: ${querySnapshot.size}`);
                
                if (querySnapshot.empty) {
                    favoritesList.innerHTML = '<div class="no-favorites">😔 У вас немає обраних товарів.<br>Додайте товари, натиснувши "Додати до обраного" на сторінках категорій.</div>';
                    return;
                }

                // Збираємо ID товарів з Firestore
                const favoriteProductIds = [];
                const favoriteDocs = {};
                
                querySnapshot.forEach((docSnapshot) => {
                    const data = docSnapshot.data();
                    const productId = data.productId || data.id;
                    addDebugMessage(`Знайдено документ: ${docSnapshot.id} -> productId: ${productId}`);
                    if (productId) {
                        favoriteProductIds.push(productId);
                        favoriteDocs[productId] = docSnapshot.id;
                    } else {
                        addDebugMessage(`⚠️ Документ ${docSnapshot.id} не містить productId: ${JSON.stringify(data)}`, true);
                    }
                });

                addDebugMessage(`Унікальних ID товарів: ${favoriteProductIds.length}`);

                // Отримуємо повну інформацію про товари з products.json
                const favoriteProducts = [];
                for (const productId of favoriteProductIds) {
                    const product = getProductById(productId);
                    if (product) {
                        favoriteProducts.push({
                            ...product,
                            favoriteDocId: favoriteDocs[productId]
                        });
                        addDebugMessage(`✅ Знайдено товар: ${product.id} - ${product.title.substring(0, 30)}...`);
                    } else {
                        addDebugMessage(`❌ Товар з ID ${productId} не знайдено в products.json`, true);
                    }
                }

                addDebugMessage(`Всього валідних товарів для відображення: ${favoriteProducts.length}`);

                if (favoriteProducts.length === 0) {
                    favoritesList.innerHTML = '<div class="no-favorites">😔 Не вдалося завантажити інформацію про товари.<br>Можливо, файл products.json пошкоджено або структура не відповідає.</div>';
                    return;
                }

                // Відображаємо товари
                favoritesList.innerHTML = '';
                favoriteProducts.forEach(product => {
                    const productCard = document.createElement('div');
                    productCard.className = 'product-card';
                    productCard.setAttribute('data-articul', product.id);
                    productCard.setAttribute('data-title', product.title);
                    
                    productCard.innerHTML = `
                        <div class="product-image-container">
                            <img class="product-image" 
                                 src="${product.image}" 
                                 alt="${escapeHtml(product.title)}"
                                 onerror="this.src='https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/no-image.png'; this.onerror=null;">
                        </div>
                        <div class="product-details">
                            <h3>${escapeHtml(product.title)}</h3>
                            <p class="articul">арт. ${escapeHtml(product.id)}</p>
                            <p class="price">${product.price || 'Ціна не вказана'}</p>
                            <a href="${product.link}" target="_blank">🛒 Купити на AliExpress</a>
                            <button class="remove-from-favorites" data-docid="${product.favoriteDocId}">🗑️ Видалити з обраного</button>
                        </div>
                    `;
                    
                    favoritesList.appendChild(productCard);
                });
                
                // Додаємо обробники подій для кнопок видалення
                document.querySelectorAll('.remove-from-favorites').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const docId = btn.getAttribute('data-docid');
                        await removeFromFavorites(docId);
                    });
                });
                
                addDebugMessage(`✅ Відображено ${favoriteProducts.length} товарів`);
                
            } catch (error) {
                addDebugMessage(`❌ Помилка завантаження обраних товарів: ${error.message}`, true);
                addDebugMessage(`Код помилки: ${error.code || 'немає'}`, true);
                favoritesList.innerHTML = `<div class="no-favorites">❌ Помилка завантаження обраних товарів: ${error.message}<br>Перевірте консоль розробника (F12) для деталей.</div>`;
            }
        }

        // Видалення товару з обраного
        async function removeFromFavorites(docId) {
            if (!confirm('Видалити цей товар з обраного?')) return;
            
            addDebugMessage(`Спроба видалення документа: ${docId}`);
            try {
                await deleteDoc(doc(db, 'favorites', docId));
                addDebugMessage(`✅ Товар успішно видалено (docId: ${docId})`);
                alert('✅ Товар видалено з обраного!');
                // Перезавантажуємо список
                const user = auth.currentUser;
                if (user) {
                    await loadFavorites(user.uid);
                }
            } catch (error) {
                addDebugMessage(`❌ Помилка видалення: ${error.message}`, true);
                alert('❌ Помилка видалення: ' + error.message);
            }
        }

        // Функція для захисту від XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Пошук серед обраних товарів
        window.searchProducts = function() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase().trim();
            const products = document.querySelectorAll('.product-card');
            
            addDebugMessage(`Пошук за запитом: "${searchInput}"`);
            
            if (!searchInput) {
                products.forEach(product => {
                    product.style.display = 'flex';
                });
                addDebugMessage('Пошук очищено, показано всі товари');
                return;
            }

            let foundCount = 0;
            products.forEach(product => {
                const articul = product.getAttribute('data-articul')?.toLowerCase() || '';
                const title = product.getAttribute('data-title')?.toLowerCase() || '';
                
                if (articul.includes(searchInput) || title.includes(searchInput)) {
                    product.style.display = 'flex';
                    foundCount++;
                } else {
                    product.style.display = 'none';
                }
            });
            addDebugMessage(`Знайдено товарів: ${foundCount}`);
        };

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });
    </script>
</body>
</html>
