<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Мій профіль - Ali.Reed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" referrerpolicy="no-referrer" rel="stylesheet"/>
    <link href="https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/AliShopik.png" rel="icon" type="image/png"/>
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3E717A;
        }
        header {
            background: url('Oformlennya_imeg/electronics.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        header h1 {
            position: relative;
            z-index: 2;
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        header .home-link, header .logout-link {
            position: relative;
            z-index: 2;
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            margin: 10px 20px;
            padding: 10px 20px;
            background-color: #ff6b6b;
            border-radius: 5px;
        }
        header .home-link:hover, header .logout-link:hover {
            background-color: #e55a5a;
            text-decoration: none;
        }
        .search-container {
            position: relative;
            z-index: 2;
            margin: 20px auto;
            max-width: 500px;
            display: flex;
            gap: 10px;
        }
        .search-container input {
            flex-grow: 1;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        .search-container button {
            padding: 10px 20px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .search-container button:hover {
            background-color: #e55a5a;
        }
        .products {
            margin: 20px auto;
            padding: 20px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }
        .product-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            aspect-ratio: 3 / 4;
        }
        .product-image {
            width: 100%;
            height: 150px;
            object-fit: contain;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .product-details {
            flex-grow: 1;
            text-align: center;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
        }
        .product-details h3 {
            margin: 10px 0;
            font-size: 1.1em;
            color: #2c3e50;
        }
        .product-details .articul {
            font-size: 0.9em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }
        .product-details a {
            color: #ffffff;
            text-decoration: none;
            background-color: #132F13;
            padding: 10px 20px;
            border-radius: 5px;
            display: block;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .product-details a:hover {
            background-color: #0e240e;
        }
        .remove-from-favorites {
            background-color: #e63946;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
        }
        .remove-from-favorites:hover {
            background-color: #c94c4c;
        }
        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        footer .social-links {
            text-align: center;
        }
        footer .social-links h2 {
            font-size: clamp(1.2rem, 3vw, 1.4rem);
            margin-bottom: 15px;
        }
        footer .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        footer .social-buttons a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        footer .social-buttons a.tiktok {
            background-color: #000000;
            border: 1px solid #fff;
        }
        footer .social-buttons a.facebook {
            background-color: #1877f2;
        }
        footer .social-buttons a.instagram {
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        }
        footer .social-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        footer .social-buttons a i {
            font-size: 1.2em;
        }
        .no-favorites {
            color: white;
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }
        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                align-items: center;
            }
            .search-container input, .search-container button {
                width: 100%;
                max-width: 200px;
            }
            .products {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                padding: 20px 10px;
            }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js" type="module"></script>
</head>
<body>
    <header>
        <h1>Мій профіль</h1>
        <a class="home-link" href="index.html">Повернутися на головну</a>
        <a class="logout-link" href="#" id="logoutLink">Вийти</a>
        <div class="search-container">
            <input id="searchInput" placeholder="Введіть артикул або назву товару" type="text"/>
            <button onclick="searchProducts()">Пошук</button>
        </div>
    </header>
    <div class="products" id="favoritesList">
        <!-- Обрані товари будуть додаватися динамічно -->
    </div>
    <footer>
        <div class="social-links">
            <h2>Слідкуй за новинками в</h2>
            <div class="social-buttons">
                <a class="tiktok" href="https://www.tiktok.com/@reedoffe" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
                <a class="facebook" href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a class="instagram" href="https://www.instagram.com/alishop__25?igsh=MXB2YmZoNWEzcWJ1Mw==" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
        <p>© 2025 Ali.Reed</p>
    </footer>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAGzhOScgX59UvDxFffwPRx9YqYAaqGj-Q",
            authDomain: "alishopping-ced60.firebaseapp.com",
            projectId: "alishopping-ced60",
            storageBucket: "alishopping-ced60.firebasestorage.app",
            messagingSenderId: "869364972631",
            appId: "1:869364972631:web:f9b736868d9844b3e7f712",
            measurementId: "G-SF4MY2768F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Перевірка автентифікації
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            console.log('Користувач увійшов:', user.uid);
            loadFavorites(user.uid);
        });

        // Функція виходу
        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Помилка виходу:', error);
                alert('Помилка виходу: ' + error.message);
            }
        });

        // Функція для отримання правильного шляху до зображення
        function getImageUrl(imagePath) {
            if (!imagePath) return null;
            
            // Якщо шлях вже починається з http або https
            if (imagePath.startsWith('http')) {
                return imagePath;
            }
            
            // Якщо це локальний шлях Windows
            if (imagePath.includes('D:\\') || imagePath.includes(':')) {
                const fileName = imagePath.split('\\').pop();
                return `Electronics_imeg/${fileName}`;
            }
            
            // Якщо це відносний шлях
            return imagePath;
        }

        // Завантаження обраних товарів
        async function loadFavorites(userId) {
            const favoritesList = document.getElementById('favoritesList');
            favoritesList.innerHTML = '';

            try {
                const q = query(collection(db, 'favorites'), where('userId', '==', userId));
                const querySnapshot = await getDocs(q);
                
                console.log('Знайдено товарів:', querySnapshot.size);
                
                if (querySnapshot.empty) {
                    favoritesList.innerHTML = '<div class="no-favorites">😔 У вас немає обраних товарів.<br>Додайте товари, натиснувши "Додати до обраного" на сторінках категорій.</div>';
                    return;
                }

                querySnapshot.forEach((docSnapshot) => {
                    const favorite = docSnapshot.data();
                    const docId = docSnapshot.id;
                    
                    console.log('Товар:', favorite);
                    
                    // Отримуємо правильний шлях до зображення
                    const imageUrl = getImageUrl(favorite.image);
                    
                    const productCard = document.createElement('div');
                    productCard.className = 'product-card';
                    productCard.setAttribute('data-articul', favorite.id);
                    productCard.setAttribute('data-title', favorite.title);
                    
                    productCard.innerHTML = `
                        <div class="product-image-container">
                            ${imageUrl ? `<img class="product-image" src="${imageUrl}" alt="${favorite.title}" onerror="this.src='https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/no-image.png'; this.onerror=null;">` : '<div style="width:100%; height:150px; background:#f0f0f0; display:flex; align-items:center; justify-content:center;">Немає фото</div>'}
                        </div>
                        <div class="product-details">
                            <h3>${escapeHtml(favorite.title)}</h3>
                            <p class="articul">арт. ${escapeHtml(favorite.id)}</p>
                            <a href="${favorite.link}" target="_blank">Купити на AliExpress</a>
                            <button class="remove-from-favorites" data-docid="${docId}">🗑️ Видалити з обраного</button>
                        </div>
                    `;
                    
                    favoritesList.appendChild(productCard);
                });
                
                // Додаємо обробники подій для кнопок видалення
                document.querySelectorAll('.remove-from-favorites').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const docId = btn.getAttribute('data-docid');
                        await removeFromFavorites(docId);
                    });
                });
                
            } catch (error) {
                console.error('Помилка завантаження обраних товарів:', error);
                favoritesList.innerHTML = '<div class="no-favorites">❌ Помилка завантаження обраних товарів. Спробуйте пізніше.</div>';
            }
        }

        // Видалення товару з обраного
        async function removeFromFavorites(docId) {
            if (!confirm('Видалити цей товар з обраного?')) return;
            
            try {
                await deleteDoc(doc(db, 'favorites', docId));
                alert('✅ Товар видалено з обраного!');
                // Перезавантажуємо список
                const user = auth.currentUser;
                if (user) {
                    loadFavorites(user.uid);
                }
            } catch (error) {
                console.error('Помилка видалення:', error);
                alert('❌ Помилка видалення: ' + error.message);
            }
        }

        // Функція для захисту від XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Пошук серед обраних товарів
        window.searchProducts = function() {
            const searchInput = document.getElementById('searchInput').value.toLowerCase().trim();
            const products = document.querySelectorAll('.product-card');

            if (!searchInput) {
                products.forEach(product => {
                    product.style.display = 'flex';
                });
                return;
            }

            products.forEach(product => {
                const articul = product.getAttribute('data-articul')?.toLowerCase() || '';
                const title = product.getAttribute('data-title')?.toLowerCase() || '';
                
                if (articul.includes(searchInput) || title.includes(searchInput)) {
                    product.style.display = 'flex';
                } else {
                    product.style.display = 'none';
                }
            });
        };

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        });
    </script>
</body>
</html>
