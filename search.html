<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук - AliShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://raw.githubusercontent.com/redl34/aliexpress-shop/main/Oformlennya_imeg/AliShopik.png" rel="icon" type="image/png">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #3E717A;
        }
        
        /* Шапка */
        .search-header {
            background: url('Oformlennya_imeg/poshuk.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 80px 20px;
            position: relative;
        }
        .search-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        .search-header h1, 
        .search-header .home-link, 
        .search-header .profile-link,
        .search-header .search-container {
            position: relative;
            z-index: 2;
        }
        .search-header h1 {
            margin: 0 0 15px 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .search-header .home-link, 
        .search-header .profile-link {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            background-color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin: 10px;
        }
        .search-header .home-link:hover, 
        .search-header .profile-link:hover {
            background-color: #e55a5a;
        }
        .search-container {
            max-width: 500px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }
        .search-container input {
            flex-grow: 1;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        .search-container button {
            padding: 12px 24px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        .search-container button:hover {
            background-color: #e55a5a;
        }
        
        /* СІТКА ТОВАРІВ - 4 КАРТКИ В РЯД */
        .search-results {
            margin: 20px auto;
            padding: 20px 10px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(4, 285px);
            gap: 20px;
            justify-content: center;
            max-width: 1250px;
            margin: 0 auto;
        }
        
        /* ФІКСОВАНИЙ РОЗМІР КАРТКИ 285px × 555px */
        .product-card {
            box-sizing: border-box;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 285px;
            height: 555px;
            position: relative;
        }
        
        .product-image-carousel {
            position: relative;
            width: 100%;
            height: 160px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .carousel-image {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            display: none;
            object-fit: contain;
        }
        .carousel-image.active {
            display: block;
        }
        .carousel-prev, .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            z-index: 10;
            border-radius: 3px;
            font-size: 14px;
        }
        .carousel-prev {
            left: 0;
        }
        .carousel-next {
            right: 0;
        }
        .carousel-indicators {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }
        .indicator {
            width: 8px;
            height: 8px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            cursor: pointer;
        }
        .indicator.active {
            background-color: rgba(0, 0, 0, 0.7);
        }
        
        .product-details {
            flex-grow: 1;
            text-align: center;
            margin: 5px 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
        }
        .product-details h3 {
            margin: 8px 0;
            font-size: 1.1em;
            color: #2c3e50;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 42px;
            font-weight: bold;
        }
        .product-details .description {
            font-size: 0.9em;
            color: #2c3e50;
            margin: 8px 0;
            line-height: 1.4;
            background-color: #f9f9f9;
            padding: 8px;
            border-radius: 5px;
            height: 85px;
            overflow-y: auto;
            text-align: left;
        }
        .product-details .description::-webkit-scrollbar {
            width: 6px;
        }
        .product-details .description::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 5px;
        }
        .product-details .description::-webkit-scrollbar-thumb {
            background: #A9A34C;
            border-radius: 5px;
        }
        .product-details .articul {
            font-size: 0.9em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }
        .product-details .price {
            font-size: 1.3em;
            font-weight: bold;
            color: #000000;
            margin: 5px 0;
        }
        .product-details a {
            color: #ffffff;
            text-decoration: none;
            background-color: #132F13;
            padding: 8px 12px;
            border-radius: 5px;
            display: block;
            margin: 6px 0;
            font-size: 0.9em;
            font-weight: bold;
        }
        .product-details a:hover {
            background-color: #0e240e;
        }
        .add-to-favorites {
            background-color: #A9A34C;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            width: 100%;
            font-weight: bold;
        }
        .add-to-favorites:hover {
            background-color: #8e8a3f;
        }
        
        .no-results {
            text-align: center;
            font-size: 1.2em;
            color: #333;
            padding: 60px;
            background: white;
            border-radius: 10px;
            margin: 40px auto;
            max-width: 500px;
        }
        
        /* Футер */
        footer {
            background-color: #000000;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
        footer .social-links {
            text-align: center;
        }
        footer .social-links h2 {
            font-size: clamp(1.2rem, 3vw, 1.4rem);
            margin-bottom: 15px;
        }
        footer .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        footer .social-buttons a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        footer .social-buttons a.tiktok {
            background-color: #000000;
            border: 1px solid #fff;
        }
        footer .social-buttons a.facebook {
            background-color: #1877f2;
        }
        footer .social-buttons a.instagram {
            background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
        }
        footer .social-buttons a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        footer .social-buttons a i {
            font-size: 1.2em;
        }
        
        /* Адаптивність */
        @media (max-width: 1250px) {
            .results-grid {
                grid-template-columns: repeat(3, 285px);
            }
        }
        @media (max-width: 950px) {
            .results-grid {
                grid-template-columns: repeat(2, 285px);
            }
        }
        @media (max-width: 650px) {
            .results-grid {
                grid-template-columns: repeat(1, 285px);
            }
            .carousel-prev, .carousel-next {
                display: none;
            }
            .product-details .description {
                height: 75px;
            }
            .search-container {
                flex-direction: column;
                align-items: center;
            }
            .search-container input, .search-container button {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js" type="module"></script>
</head>
<body>
    <header class="search-header">
        <h1>Пошук товарів</h1>
        <a class="home-link" href="index.html">Повернутися на головну</a>
        <a class="profile-link" href="#" id="profileLink">Мій профіль</a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Введіть артикул або назву товару">
            <button onclick="performSearch()">Пошук</button>
        </div>
    </header>

    <div class="search-results">
        <div id="resultsContainer" class="results-grid">
            <!-- Результати пошуку -->
        </div>
    </div>

    <footer>
        <div class="social-links">
            <h2>Слідкуй за новинками в</h2>
            <div class="social-buttons">
                <a class="tiktok" href="https://www.tiktok.com/@reedoffe" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
                <a class="facebook" href="https://www.facebook.com" target="_blank"><i class="fab fa-facebook-f"></i> Facebook</a>
                <a class="instagram" href="https://www.instagram.com/alishop__25?igsh=MXB2YmZoNWEzcWJ1Mw==" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>
        <p>© 2026 AliShop</p>
    </footer>

    <script type="module">
        // ========== Firebase ініціалізація ==========
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAGzhOScgX59UvDxFffwPRx9YqYAaqGj-Q",
            authDomain: "alishopping-ced60.firebaseapp.com",
            projectId: "alishopping-ced60",
            storageBucket: "alishopping-ced60.firebasestorage.app",
            messagingSenderId: "869364972631",
            appId: "1:869364972631:web:f9b736868d9844b3e7f712",
            measurementId: "G-SF4MY2768F"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Отримуємо елемент кнопки профілю
        const profileLink = document.getElementById('profileLink');
        
        // Відстеження стану авторизації для оновлення кнопки профілю
        onAuthStateChanged(auth, (user) => {
            if (user) {
                profileLink.href = 'profile.html';
                profileLink.textContent = 'Мій профіль';
                console.log("Користувач авторизований:", user.email);
            } else {
                profileLink.href = 'login.html';
                profileLink.textContent = 'Увійти';
                console.log("Користувач не авторизований");
            }
        });

        // Функція додавання в обране (ПОВНІСТЮ як на mens-clothing_page_1.html)
        window.addToFavorites = async function(id, title, image, link) {
            console.log("addToFavorites викликано:", {id, title, image, link});
            
            if (!auth.currentUser) {
                alert('Будь ласка, увійдіть до облікового запису.');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                // Перевіряємо чи вже є товар в обраних
                const q = query(collection(db, 'favorites'), 
                    where('userId', '==', auth.currentUser.uid),
                    where('id', '==', id));
                const existing = await getDocs(q);
                
                if (!existing.empty) {
                    alert('⚠️ Цей товар вже є у ваших обраних!');
                    return;
                }
                
                // Додаємо товар до обраних
                await addDoc(collection(db, 'favorites'), {
                    userId: auth.currentUser.uid,
                    id: id,
                    title: title,
                    image: image,
                    link: link,
                    addedAt: new Date().toISOString()
                });
                alert('✅ Товар додано до обраного!');
                console.log("Товар успішно додано!");
            } catch (error) {
                console.error('Помилка додавання:', error);
                alert('❌ Помилка: ' + error.message);
            }
        };

        // ========== Логіка пошуку ==========
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q') || '';
        const searchInput = document.getElementById('searchInput');
        if (queryParam) {
            searchInput.value = decodeURIComponent(queryParam);
            performSearch();
        }

        // Очищення запиту від слів "арт", "артикул"
        function cleanSearchTerm(term) {
            return term.replace(/\b(арт\.?|артикул)\b/gi, '').replace(/[^\w\d]/g, '').trim();
        }

        async function performSearch() {
            const rawTerm = searchInput.value.trim().toLowerCase();
            if (!rawTerm) {
                document.getElementById('resultsContainer').innerHTML = '<div class="no-results">Введіть запит для пошуку</div>';
                return;
            }

            const cleanTerm = cleanSearchTerm(rawTerm);

            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('Не вдалося завантажити товари');
                const products = await response.json();

                const results = products.filter(product => {
                    const articulMatch = cleanTerm && product.articul && product.articul.toLowerCase().includes(cleanTerm);
                    const titleMatch = product.title && product.title.toLowerCase().includes(rawTerm);
                    return articulMatch || titleMatch;
                });

                displayResults(results);
            } catch (error) {
                console.error('Помилка завантаження товарів:', error);
                document.getElementById('resultsContainer').innerHTML = '<div class="no-results">Помилка завантаження даних</div>';
            }
        }

        function displayResults(products) {
            const container = document.getElementById('resultsContainer');
            if (products.length === 0) {
                container.innerHTML = '<div class="no-results">Нічого не знайдено 😔<br>Спробуйте змінити запит</div>';
                return;
            }

            let html = '';
            products.forEach(product => {
                const title = product.title || 'Без назви';
                const description = product.description || '';
                const articul = product.articul || '';
                const price = product.price || 'Ціна не вказана';
                const link = product.link || '#';
                const images = (product.images && product.images.length) ? product.images : (product.image ? [product.image] : ['placeholder.jpg']);

                let imagesHtml = '';
                images.forEach((img, index) => {
                    imagesHtml += `<img alt="${title}" class="carousel-image ${index === 0 ? 'active' : ''}" src="${img}" onerror="this.src='placeholder.jpg'">`;
                });

                let indicatorsHtml = '';
                if (images.length > 1) {
                    images.forEach((_, index) => {
                        indicatorsHtml += `<span class="indicator ${index === 0 ? 'active' : ''}"></span>`;
                    });
                }

                // Екрануємо спеціальні символи для onclick
                const escapedTitle = title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const escapedArticul = articul.replace(/'/g, "\\'");

                html += `
                    <div class="product-card" data-articul="${escapeHtml(articul)}">
                        <div class="product-image-carousel">
                            <div class="carousel-container">
                                ${imagesHtml}
                                ${images.length > 1 ? `<button class="carousel-prev">←</button>
                                <button class="carousel-next">→</button>
                                <div class="carousel-indicators">${indicatorsHtml}</div>` : ''}
                            </div>
                        </div>
                        <div class="product-details">
                            <h3>${escapeHtml(title)}</h3>
                            <div class="description">${escapeHtml(description)}</div>
                            <p class="articul">арт. ${escapeHtml(articul)}</p>
                            <p class="price">${escapeHtml(price)}</p>
                            <a href="${link}" target="_blank">Купити на AliExpress</a>
                            <button class="add-to-favorites" onclick="addToFavorites('${escapeHtml(articul)}', '${escapedTitle}', '${images[0]}', '${link}')">Додати до обраного</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            initCarousels();
        }
        
        // Функція захисту від XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function initCarousels() {
            document.querySelectorAll('.product-image-carousel').forEach(carousel => {
                const images = carousel.querySelectorAll('.carousel-image');
                if (images.length <= 1) return;
                
                const indicators = carousel.querySelectorAll('.indicator');
                const prevButton = carousel.querySelector('.carousel-prev');
                const nextButton = carousel.querySelector('.carousel-next');
                let currentIndex = 0;

                function updateCarousel() {
                    images.forEach((img, index) => {
                        img.classList.toggle('active', index === currentIndex);
                    });
                    if (indicators.length) {
                        indicators.forEach((indicator, index) => {
                            indicator.classList.toggle('active', index === currentIndex);
                        });
                    }
                }

                if (prevButton) {
                    prevButton.addEventListener('click', (e) => {
                        e.stopPropagation();
                        currentIndex = (currentIndex - 1 + images.length) % images.length;
                        updateCarousel();
                    });
                }

                if (nextButton) {
                    nextButton.addEventListener('click', (e) => {
                        e.stopPropagation();
                        currentIndex = (currentIndex + 1) % images.length;
                        updateCarousel();
                    });
                }

                if (indicators.length) {
                    indicators.forEach((indicator, index) => {
                        indicator.addEventListener('click', (e) => {
                            e.stopPropagation();
                            currentIndex = index;
                            updateCarousel();
                        });
                    });
                }

                // Свайп для мобільних пристроїв
                let touchStartX = 0, touchEndX = 0;
                carousel.addEventListener('touchstart', (e) => {
                    touchStartX = e.changedTouches[0].screenX;
                });
                carousel.addEventListener('touchend', (e) => {
                    touchEndX = e.changedTouches[0].screenX;
                    if (touchEndX < touchStartX - 50) {
                        currentIndex = (currentIndex + 1) % images.length;
                        updateCarousel();
                    } else if (touchEndX > touchStartX + 50) {
                        currentIndex = (currentIndex - 1 + images.length) % images.length;
                        updateCarousel();
                    }
                });
            });
        }

        // Пошук по Enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        window.performSearch = performSearch;
    </script>
</body>
</html>
