<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пошук - AliShop</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        /* Стилі для шапки з новим зображенням */
        .search-header {
            background: url('Oformlennya_imeg/poshuk.jpg') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 120px 20px;
            position: relative;
        }
        .search-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        .search-header h1, .search-header .home-link, .search-header .search-container {
            position: relative;
            z-index: 2;
        }
        .search-header .home-link {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            background-color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin: 10px;
        }
        .search-header .home-link:hover {
            background-color: #e55a5a;
        }
        /* Контейнер для результатів */
        .search-results {
            margin: 20px auto;
            padding: 20px;
            max-width: 1200px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-image {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 5px;
        }
        .product-details {
            text-align: center;
            margin-top: 10px;
        }
        .product-details h3 {
            font-size: 1.2em;
            color: #2c3e50;
        }
        .product-details .articul {
            font-weight: bold;
            color: #000;
        }
        .product-details .price {
            font-size: 1.5em;
            font-weight: bold;
            color: #000;
        }
        .product-details a {
            display: block;
            background-color: #132F13;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .product-details a:hover {
            background-color: #0e240e;
        }
        .no-results {
            text-align: center;
            font-size: 1.2em;
            color: #333;
            padding: 40px;
        }
        footer {
            background-color: #000;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header class="search-header">
        <h1>Пошук товарів</h1>
        <a class="home-link" href="index.html">Повернутися на головну</a>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Введіть артикул або назву товару">
            <button onclick="performSearch()">Пошук</button>
        </div>
    </header>

    <div class="search-results">
        <div id="resultsContainer" class="results-grid">
            <!-- Тут будуть результати пошуку -->
        </div>
    </div>

    <footer>
        <p>© 2025 Ali.Reed</p>
    </footer>

    <script>
        // Отримуємо пошуковий запит з URL
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q') || '';

        // Заповнюємо поле пошуку
        const searchInput = document.getElementById('searchInput');
        if (query) {
            searchInput.value = decodeURIComponent(query);
            performSearch();
        }

        // Функція пошуку
        async function performSearch() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            if (!searchTerm) {
                document.getElementById('resultsContainer').innerHTML = '<p class="no-results">Введіть запит для пошуку</p>';
                return;
            }

            try {
                // Завантажуємо products.json
                const response = await fetch('products.json');
                const products = await response.json();

                // Фільтруємо за артикулом або назвою
                const results = products.filter(product => 
                    product.articul.toLowerCase().includes(searchTerm) ||
                    product.title.toLowerCase().includes(searchTerm)
                );

                displayResults(results);
            } catch (error) {
                console.error('Помилка завантаження товарів:', error);
                document.getElementById('resultsContainer').innerHTML = '<p class="no-results">Помилка завантаження даних</p>';
            }
        }

        // Відображення результатів
        function displayResults(products) {
            const container = document.getElementById('resultsContainer');
            if (products.length === 0) {
                container.innerHTML = '<p class="no-results">Нічого не знайдено</p>';
                return;
            }

            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card">
                        <img class="product-image" src="${product.image}" alt="${product.title}" onerror="this.src='placeholder.jpg'">
                        <div class="product-details">
                            <h3>${product.title}</h3>
                            <p class="articul">арт. ${product.articul}</p>
                            <p class="price">${product.price}</p>
                            <a href="${product.link}" target="_blank">Купити на AliExpress</a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Обробка Enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
